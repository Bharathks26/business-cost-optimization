<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Business Cost Optimization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .section-title {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }
        .register-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .register-container { margin: 0 10px; padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>💼 CostOptimizer</h1>
            <p>Create Your Business Account</p>
        </div>

        <form method="POST">
            <div class="form-section">
                <h3 class="section-title">Account Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" required 
                               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,15}" 
                               maxlength="15"
                               title="Password must be 8-15 characters with 1 uppercase, 1 lowercase, 1 number, and 1 special character">
                        <small style="color: #666; font-size: 12px;">8-15 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char</small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <input type="User" id="User" name="User" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Company Details</h3>
                <div class="form-group">
                    <label for="company_name">Company Name *</label>
                    <input type="text" id="company_name" name="company_name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="industry">Industry</label>
                        <select id="industry" name="industry" onchange="toggleOtherIndustry()">
                            <option value="">Select Industry</option>
                            <option value="technology">Technology</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="retail">Retail</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="finance">Finance</option>
                            <option value="education">Education</option>
                            <option value="construction">Construction</option>
                            <option value="hospitality">Hospitality</option>
                            <option value="other">Other</option>
                        </select>
                        <input type="text" id="other_industry" name="other_industry" placeholder="Enter your industry" style="display: none; margin-top: 10px;">
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" placeholder="e.g., Finance, Marketing, Operations">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Business Goals</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="budget_range">Monthly Budget Range</label>
                        <select id="budget_range" name="budget_range">
                            <option value="">Select Range</option>
                            <option value="0-10k">₹0 - ₹10L</option>
                            <option value="10k-50k">₹10L - ₹50L</option>
                            <option value="50k-100k">₹50L - ₹1Cr</option>
                            <option value="100k+">₹1Cr+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cost_target">Cost Reduction Target (%)</label>
                        <input type="number" id="cost_target" name="cost_target" min="0" max="100" placeholder="e.g., 15">
                    </div>
                </div>
            </div>

            <button type="submit" class="register-btn">Create Account</button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="/login">Sign In</a></p>
        </div>
    </div>

    <script>
        function toggleOtherIndustry() {
            const industrySelect = document.getElementById('industry');
            const otherIndustryInput = document.getElementById('other_industry');
            
            if (industrySelect.value === 'other') {
                otherIndustryInput.style.display = 'block';
                otherIndustryInput.required = true;
                otherIndustryInput.focus();
            } else {
                otherIndustryInput.style.display = 'none';
                otherIndustryInput.required = false;
                otherIndustryInput.value = '';
            }
        }
    </script>
</body>
</html>
