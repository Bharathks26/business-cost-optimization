<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: block;
            transition: background-color 0.3s;
        }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #1e7e34; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-secondary:hover { background-color: #545b62; }
        .logout-section {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Dashboard</h1>
        <p>Welcome, Administrator</p>
    </div>
    
    <div class="button-grid">
        <a href="{{ url_for('admin_users') }}" class="btn btn-primary">View All Users</a>
        <a href="{{ url_for('upload_expenses') }}" class="btn btn-primary">Upload Data</a>
        <a href="{{ url_for('analytics_dashboard') }}" class="btn btn-success">View Analytics</a>
        <a href="#" onclick="deleteAllData()" class="btn btn-danger">Delete All Data</a>
        <a href="{{ url_for('download_report') }}" class="btn btn-secondary">Download Report</a>
    </div>
    
    <div class="logout-section">
        <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
    </div>

    <script>
        function deleteAllData() {
            if (confirm('Are you sure you want to delete all data? This action cannot be undone.')) {
                fetch('/delete-data', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    if (data.success) location.reload();
                });
            }
        }
    </script>
</body>
</html>
